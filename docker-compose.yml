services:
  # Keycloak — OIDC identity provider
  # Uses LAN PostgreSQL (same server as LedgerForge)
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    command: start-dev --import-realm
    restart: always
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://192.168.1.65:34155/keycloak_db
      KC_DB_USERNAME: infotitans
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-swift1FEMZY14}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    volumes:
      - ./keycloak/oluto-realm.json:/opt/keycloak/data/import/oluto-realm.json
      - ./keycloak/themes/oluto:/opt/keycloak/themes/oluto

  # LedgerForge — Rust/Axum double-entry accounting API
  # Uses LAN PostgreSQL (192.168.1.65:34155) and Redis (192.168.1.65:37263)
  backend:
    build:
      context: ../ledger-forge
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ../ledger-forge/.env
    environment:
      - HOST=0.0.0.0
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=oluto

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000/api/v1
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - backend
