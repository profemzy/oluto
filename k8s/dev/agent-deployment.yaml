# =============================================================================
# ZeroClaw Agent Gateway — Rust/Axum (DEV)
# Runs with --target dev Docker stage (skills baked into image).
# Image is built and pushed by the ZeroClaw CI pipeline.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oluto-agent
  namespace: oluto
  labels:
    app: oluto-agent
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oluto-agent
  template:
    metadata:
      labels:
        app: oluto-agent
        environment: dev
    spec:
      containers:
        - name: oluto-agent
          image: wackopscoachdevacr.azurecr.io/oluto-agent:latest
          imagePullPolicy: Always
          env:
            - name: ZEROCLAW_GATEWAY_PORT
              value: "18790"
            - name: PROVIDER
              value: "fuelix"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: oluto-secret
                  key: FUELIX_API_KEY
            - name: API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: oluto-secret
                  key: FUELIX_BASE_URL
            - name: ZEROCLAW_MODEL
              valueFrom:
                secretKeyRef:
                  name: oluto-secret
                  key: ZEROCLAW_FUELIX_MODEL
            - name: KEYCLOAK_URL
              value: "https://auth.dev.oluto.app"
            - name: KEYCLOAK_REALM
              value: "oluto"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oluto-secret
                  key: KEYCLOAK_CLIENT_SECRET
            - name: OLUTO_API_BASE_URL
              value: "http://oluto-backend"
            - name: RUST_LOG
              value: "info"
          ports:
            - containerPort: 18790
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 18790
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 18790
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
