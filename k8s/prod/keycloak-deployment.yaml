# =============================================================================
# Keycloak — OIDC Identity Provider (PROD)
# Uses external Azure PostgreSQL (keycloak_db). TLS terminated at ingress.
# Realm import runs on first startup via ConfigMap mount.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: oluto
  labels:
    app: keycloak
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        environment: production
    spec:
      initContainers:
        - name: setup-theme
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              mkdir -p /themes/oluto/login/resources/css
              cp /theme-src/theme.properties /themes/oluto/login/
              cp /theme-src/template.ftl /themes/oluto/login/
              cp /theme-src/login.ftl /themes/oluto/login/
              cp /theme-src/register.ftl /themes/oluto/login/
              cp /theme-src/login-reset-password.ftl /themes/oluto/login/
              cp /theme-src/oluto-login.css /themes/oluto/login/resources/css/
          volumeMounts:
            - name: theme-source
              mountPath: /theme-src
              readOnly: true
            - name: theme-volume
              mountPath: /themes
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.4
          args:
            - start
            - --import-realm
          env:
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: oluto-secret
                  key: KEYCLOAK_DB_URL
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: oluto-secret
                  key: KEYCLOAK_DB_USERNAME
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oluto-secret
                  key: KEYCLOAK_DB_PASSWORD
            - name: KC_HOSTNAME
              value: "auth.oluto.app"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            - name: KEYCLOAK_ADMIN
              value: "kcadmin"
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oluto-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: management
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true
            - name: theme-volume
              mountPath: /opt/keycloak/themes
              readOnly: true
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
        - name: theme-source
          configMap:
            name: keycloak-theme-files
        - name: theme-volume
          emptyDir: {}
