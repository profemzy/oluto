# =============================================================================
# ZeroClaw Agent Gateway — Rust/Axum (PROD)
# Runs with --target dev Docker stage (skills baked into image).
# Image is built and pushed by the ZeroClaw CI pipeline.
#
# Config loaded from zeroclaw-config ConfigMap (config.toml + oluto-config.json).
# API key injected via ZEROCLAW_API_KEY env var from zeroclaw-secrets secret.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oluto-agent
  namespace: oluto
  labels:
    app: oluto-agent
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oluto-agent
  template:
    metadata:
      labels:
        app: oluto-agent
        environment: production
    spec:
      containers:
        - name: oluto-agent
          image: wackopscoachprodacr.azurecr.io/oluto-agent:latest
          imagePullPolicy: Always
          env:
            - name: HOME
              value: "/zeroclaw-data"
            - name: ZEROCLAW_WORKSPACE
              value: "/zeroclaw-data/workspace"
            - name: ZEROCLAW_GATEWAY_PORT
              value: "18790"
            - name: ZEROCLAW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-secrets
                  key: api-key
            - name: ZEROCLAW_MODEL
              valueFrom:
                secretKeyRef:
                  name: oluto-secret
                  key: ZEROCLAW_FUELIX_MODEL
            - name: OLUTO_API_BASE_URL
              value: "http://oluto-backend"
            - name: RUST_LOG
              value: "info"
          volumeMounts:
            - name: zeroclaw-config
              mountPath: /zeroclaw-data/.zeroclaw/config.toml
              subPath: config.toml
              readOnly: true
            - name: zeroclaw-config
              mountPath: /zeroclaw-data/.oluto-config.json
              subPath: oluto-config.json
              readOnly: true
          ports:
            - containerPort: 18790
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 18790
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 18790
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: zeroclaw-config
          configMap:
            name: zeroclaw-config
