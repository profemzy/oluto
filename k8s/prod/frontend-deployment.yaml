apiVersion: apps/v1
kind: Deployment
metadata:
  name: oluto-frontend
  namespace: oluto
  labels:
    app: oluto-frontend
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oluto-frontend
  template:
    metadata:
      labels:
        app: oluto-frontend
        environment: production
    spec:
      containers:
        - name: oluto-frontend
          image: wackopscoachprodacr.azurecr.io/oluto-frontend:366
          imagePullPolicy: Always
          env:
            - name: GATEWAY_URL
              value: "http://oluto-agent:18790"
            - name: NEXT_PUBLIC_KEYCLOAK_URL
              value: "https://auth.oluto.app"
            - name: NEXT_PUBLIC_KEYCLOAK_REALM
              value: "oluto"
            - name: NEXT_PUBLIC_KEYCLOAK_CLIENT_ID
              value: "oluto-web"
          ports:
            - containerPort: 3000
              name: http
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
