# =============================================================================
# ConfigMap for Keycloak Realm Import (PROD)
# Mounts oluto-realm.json at /opt/keycloak/data/import/ for auto-import
# on first startup (--import-realm flag).
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: oluto
data:
  oluto-realm.json: |
    {
      "realm": "oluto",
      "enabled": true,
      "loginTheme": "oluto",
      "registrationAllowed": true,
      "registrationEmailAsUsername": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "sslRequired": "external",
      "accessTokenLifespan": 1800,
      "ssoSessionIdleTimeout": 3600,
      "ssoSessionMaxLifespan": 36000,
      "roles": {
        "realm": [
          {
            "name": "viewer",
            "description": "Read-only access to business data"
          },
          {
            "name": "accountant",
            "description": "Can manage transactions, invoices, bills, and reports"
          },
          {
            "name": "admin",
            "description": "Full access including user and business management"
          }
        ]
      },
      "clients": [
        {
          "clientId": "oluto-web",
          "name": "Oluto Web Frontend",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "rootUrl": "https://oluto.app",
          "baseUrl": "/",
          "redirectUris": [
            "https://oluto.app/*"
          ],
          "webOrigins": [
            "https://oluto.app"
          ],
          "attributes": {
            "pkce.code.challenge.method": "S256"
          },
          "defaultClientScopes": [
            "basic",
            "profile",
            "email",
            "oluto-claims"
          ]
        },
        {
          "clientId": "oluto-api",
          "name": "LedgerForge API (Resource Server)",
          "enabled": true,
          "bearerOnly": true,
          "publicClient": false,
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false
        },
        {
          "clientId": "oluto-desktop",
          "name": "Oluto Desktop App",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "redirectUris": [
            "oluto://auth/callback"
          ],
          "attributes": {
            "pkce.code.challenge.method": "S256"
          },
          "defaultClientScopes": [
            "basic",
            "profile",
            "email",
            "oluto-claims"
          ]
        },
        {
          "clientId": "oluto-cli",
          "name": "Oluto CLI / Testing",
          "description": "Direct access grants for CLI tools and testing",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "defaultClientScopes": [
            "basic",
            "profile",
            "email",
            "oluto-claims"
          ]
        },
        {
          "clientId": "oluto-agent-service",
          "name": "ZeroClaw Agent Service Account",
          "description": "Service-to-service communication for the AI agent gateway",
          "enabled": true,
          "publicClient": false,
          "serviceAccountsEnabled": true,
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "secret": "change-me-in-production",
          "defaultClientScopes": [
            "basic",
            "profile",
            "email",
            "oluto-claims"
          ]
        }
      ],
      "clientScopes": [
        {
          "name": "basic",
          "description": "OpenID Connect basic scope (sub claim)",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "false",
            "display.on.consent.screen": "false"
          },
          "protocolMappers": [
            {
              "name": "sub",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-sub-mapper",
              "consentRequired": false,
              "config": {
                "access.token.claim": "true",
                "introspection.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "profile",
          "description": "OpenID Connect profile scope (preferred_username, name)",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "false"
          },
          "protocolMappers": [
            {
              "name": "username",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "consentRequired": false,
              "config": {
                "introspection.token.claim": "true",
                "userinfo.token.claim": "true",
                "user.attribute": "username",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "preferred_username",
                "jsonType.label": "String"
              }
            },
            {
              "name": "full name",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-full-name-mapper",
              "consentRequired": false,
              "config": {
                "id.token.claim": "true",
                "access.token.claim": "true",
                "introspection.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "email",
          "description": "OpenID Connect email scope",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "false"
          },
          "protocolMappers": [
            {
              "name": "email",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "consentRequired": false,
              "config": {
                "introspection.token.claim": "true",
                "userinfo.token.claim": "true",
                "user.attribute": "email",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "email",
                "jsonType.label": "String"
              }
            },
            {
              "name": "email verified",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "consentRequired": false,
              "config": {
                "introspection.token.claim": "true",
                "userinfo.token.claim": "true",
                "user.attribute": "emailVerified",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "email_verified",
                "jsonType.label": "boolean"
              }
            }
          ]
        },
        {
          "name": "oluto-claims",
          "description": "Oluto custom claims (business_id, roles)",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "false"
          },
          "protocolMappers": [
            {
              "name": "business_id",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "config": {
                "user.attribute": "business_id",
                "claim.name": "business_id",
                "jsonType.label": "String",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "realm-roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "config": {
                "claim.name": "realm_access.roles",
                "jsonType.label": "String",
                "multivalued": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ]
    }
