# =============================================================================
# Pipeline: cd-frontend-dev.yml (Frontend-CD-DEV)
# Purpose: Deploy Oluto frontend to DEV AKS cluster
# Triggers: Successful Frontend-CI builds or manual runs
#
# Applies ONLY the frontend deployment manifest. Shared infra is managed
# by the cd-infra-dev.yml pipeline.
# =============================================================================

trigger: none
pr: none

resources:
  pipelines:
    - pipeline: frontend-ci
      source: "Frontend-CI"
      trigger:
        enabled: true
        branches:
          include:
            - master
            - main

variables:
  acrLoginServer: "wackopscoachdevacr.azurecr.io"
  azureServiceConnection: "terraformiacdevops1"
  frontendImageRepository: "oluto-frontend"

parameters:
  - name: imageTag
    displayName: "Frontend Image Tag to Deploy"
    type: string
    default: "latest"

stages:
  - stage: Deploy_Frontend_DEV
    displayName: "Deploy Frontend to DEV"
    variables:
      imageTag: ${{ coalesce(variables['resources.pipeline.frontend-ci.runName'], parameters.imageTag) }}
    jobs:
      - deployment: Deploy_Frontend_DEV_AKS
        displayName: "Deploy Frontend to DEV AKS"
        pool:
          vmImage: "ubuntu-24.04"
        environment: "dev"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                # Download build info from CI
                - task: DownloadBuildArtifacts@1
                  displayName: "Download Build Info"
                  inputs:
                    buildType: "specific"
                    project: "$(System.TeamProject)"
                    pipeline: "Frontend-CI"
                    buildVersionToDownload: "latestFromBranch"
                    branchName: "$(Build.SourceBranch)"
                    downloadType: "single"
                    artifactName: "build-info"
                    downloadPath: "$(System.ArtifactsDirectory)"
                  continueOnError: true

                # Resolve image tag from CI artifact or parameter
                - task: Bash@3
                  displayName: "Set Image Tag"
                  inputs:
                    targetType: "inline"
                    script: |
                      if [ -f "$(System.ArtifactsDirectory)/build-info/image-tag.txt" ]; then
                        TAG=$(cat $(System.ArtifactsDirectory)/build-info/image-tag.txt)
                        echo "Using tag from CI: $TAG"
                        echo "##vso[task.setvariable variable=tag]$TAG"
                      else
                        echo "Using parameter tag: ${{ parameters.imageTag }}"
                        echo "##vso[task.setvariable variable=tag]${{ parameters.imageTag }}"
                      fi

                # Sed the real tag into the manifest
                - task: Bash@3
                  displayName: "Update Frontend Manifest"
                  inputs:
                    targetType: "inline"
                    script: |
                      echo "Deploying frontend: $(acrLoginServer)/$(frontendImageRepository):$(tag)"
                      sed -i "s|image:.*oluto-frontend:.*|image: $(acrLoginServer)/$(frontendImageRepository):$(tag)|g" k8s/dev/frontend-deployment.yaml
                      echo "--- Frontend deployment image:"
                      grep "image:" k8s/dev/frontend-deployment.yaml

                - task: AzureCLI@2
                  displayName: "Apply Frontend Deployment (DEV)"
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: "bash"
                    scriptLocation: "inlineScript"
                    inlineScript: |
                      az aks install-cli
                      az aks get-credentials \
                        --resource-group wackopscoach-dev-rg \
                        --name wackopscoach-dev-aks \
                        --overwrite-existing
                      kubelogin convert-kubeconfig -l azurecli
                      kubectl apply -f k8s/dev/frontend-deployment.yaml -n oluto
                      kubectl rollout status deployment/oluto-frontend -n oluto --timeout=300s

                - task: Bash@3
                  displayName: "Verify DEV"
                  inputs:
                    targetType: "inline"
                    script: |
                      echo "Verifying DEV at https://dev.oluto.app"
                      sleep 10
                      curl -sf https://dev.oluto.app/api/v1/health || exit 1
                      echo "DEV deployment verified!"
