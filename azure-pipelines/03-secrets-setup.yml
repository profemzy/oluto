# =============================================================================
# Pipeline: 03-secrets-setup.yml
# Purpose: One-time setup of application secrets in Azure Key Vault
# Triggers: Manual only
#
# Usage: Run this pipeline once per environment to populate Key Vault with
# all application secrets. Terraform handles the DB server infrastructure;
# this pipeline handles application-level secrets for LedgerForge (DATABASE_URL,
# AI, OCR) and ZeroClaw agent (LLM model selection).
#
# Note: ZeroClaw shares the Fuelix API key and base URL with LedgerForge
# (oluto-fuelix-api-key, oluto-fuelix-base-url). Only the model name differs.
# =============================================================================

trigger: none

name: "Oluto Secrets Setup"

parameters:
  - name: environment
    displayName: "Target Environment"
    type: string
    default: "dev"
    values:
      - dev
      - prod

  - name: databaseUrl
    displayName: "Database URL (postgresql://user:pass@host:port/db?sslmode=require)"
    type: string

  - name: fuelixApiKey
    displayName: "Fuelix API Key (shared by LedgerForge and ZeroClaw)"
    type: string

  - name: fuelixBaseUrl
    displayName: "Fuelix Base URL"
    type: string
    default: "https://api.fuelix.ai/v1"

  - name: fuelixModel
    displayName: "Fuelix Model (LedgerForge)"
    type: string
    default: "claude-haiku-4-5"

  - name: azureApiKey
    displayName: "Azure OCR API Key"
    type: string

  - name: azureOcrUrl
    displayName: "Azure OCR URL"
    type: string
    default: "https://profemzy-5149-resource.services.ai.azure.com/providers/mistral/azure/ocr"

  - name: azureOcrModel
    displayName: "Azure OCR Model"
    type: string
    default: "mistral-document-ai-2505"

  - name: zeroclawFuelixModel
    displayName: "ZeroClaw — Fuelix Model Name (agent LLM, differs from LedgerForge)"
    type: string
    default: "gemini-3-flash"

  - name: keycloakDatabaseUrl
    displayName: "Keycloak Database URL (jdbc:postgresql://host:port/keycloak_db?sslmode=require)"
    type: string

  - name: keycloakDbUsername
    displayName: "Keycloak DB Username"
    type: string
    default: "psqladmin"

  - name: keycloakDbPassword
    displayName: "Keycloak DB Password"
    type: string

  - name: keycloakAdminPassword
    displayName: "Keycloak Admin Console Password (user: kcadmin)"
    type: string

  - name: keycloakAgentServiceSecret
    displayName: "Keycloak oluto-agent-service Client Secret (rotate via keycloak-setup.sh --rotate-secret)"
    type: string
    default: ""

variables:
  azureServiceConnection: "terraformiacdevops1"

stages:
  - stage: Setup_Secrets
    displayName: "Setup Secrets (${{ parameters.environment }})"
    jobs:
      - job: Populate_KeyVault
        displayName: "Populate Key Vault Secrets"
        pool:
          vmImage: "ubuntu-24.04"
        steps:
          - task: AzureCLI@2
            displayName: "Set Oluto Secrets in Key Vault"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                KV_NAME="wackopscoach-${{ parameters.environment }}-kv"
                echo "Setting secrets in Key Vault: $KV_NAME"

                # LedgerForge backend — DATABASE_URL
                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "oluto-database-url" \
                  --value "${{ parameters.databaseUrl }}" \
                  --output none

                # Fuelix AI (shared by LedgerForge and ZeroClaw)
                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "oluto-fuelix-api-key" \
                  --value "${{ parameters.fuelixApiKey }}" \
                  --output none

                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "oluto-fuelix-base-url" \
                  --value "${{ parameters.fuelixBaseUrl }}" \
                  --output none

                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "oluto-fuelix-model" \
                  --value "${{ parameters.fuelixModel }}" \
                  --output none

                # Azure OCR (PDF import)
                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "oluto-azure-api-key" \
                  --value "${{ parameters.azureApiKey }}" \
                  --output none

                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "oluto-azure-ocr-url" \
                  --value "${{ parameters.azureOcrUrl }}" \
                  --output none

                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "oluto-azure-ocr-model" \
                  --value "${{ parameters.azureOcrModel }}" \
                  --output none

                # ZeroClaw Agent — only the model name differs from LedgerForge
                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "zeroclaw-fuelix-model" \
                  --value "${{ parameters.zeroclawFuelixModel }}" \
                  --output none

                # Keycloak — OIDC identity provider
                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "keycloak-database-url" \
                  --value "${{ parameters.keycloakDatabaseUrl }}" \
                  --output none

                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "keycloak-db-username" \
                  --value "${{ parameters.keycloakDbUsername }}" \
                  --output none

                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "keycloak-db-password" \
                  --value "${{ parameters.keycloakDbPassword }}" \
                  --output none

                az keyvault secret set --vault-name "$KV_NAME" \
                  --name "keycloak-admin-password" \
                  --value "${{ parameters.keycloakAdminPassword }}" \
                  --output none

                # Keycloak oluto-agent-service client secret (optional — only if provided)
                if [ -n "${{ parameters.keycloakAgentServiceSecret }}" ]; then
                  az keyvault secret set --vault-name "$KV_NAME" \
                    --name "keycloak-agent-service-secret" \
                    --value "${{ parameters.keycloakAgentServiceSecret }}" \
                    --output none
                  echo "  keycloak-agent-service-secret: SET"
                else
                  echo "  keycloak-agent-service-secret: SKIPPED (no value provided)"
                fi

                echo "All secrets set successfully in $KV_NAME"

          - task: AzureCLI@2
            displayName: "Verify Secrets"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                KV_NAME="wackopscoach-${{ parameters.environment }}-kv"
                echo "Verifying secrets in $KV_NAME..."

                SECRETS=(
                  "oluto-database-url"
                  "oluto-fuelix-api-key"
                  "oluto-fuelix-base-url"
                  "oluto-fuelix-model"
                  "oluto-azure-api-key"
                  "oluto-azure-ocr-url"
                  "oluto-azure-ocr-model"
                  "zeroclaw-fuelix-model"
                  "keycloak-database-url"
                  "keycloak-db-username"
                  "keycloak-db-password"
                  "keycloak-admin-password"
                  "keycloak-agent-service-secret"
                )

                for SECRET in "${SECRETS[@]}"; do
                  if az keyvault secret show --vault-name "$KV_NAME" --name "$SECRET" --query "name" -o tsv > /dev/null 2>&1; then
                    echo "  $SECRET: OK"
                  else
                    echo "  $SECRET: MISSING"
                    exit 1
                  fi
                done

                echo "All secrets verified!"
